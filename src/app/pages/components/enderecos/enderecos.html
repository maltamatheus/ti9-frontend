<div class="container-cadastro">
  <!-- <mat-card>
    <mat-card-content> -->
      <form [formGroup]="cadastroEndereco">
        <mat-form-field appearance="fill" class="campo-input" style="padding-right: 2.5%;">
          <mat-label>Logradouro</mat-label>
          <input matInput formControlName="logradouro" maxlength="150" placeholder="Logradouro...">
        </mat-form-field>

        <mat-form-field appearance="fill" class="campo-input" style="padding-right: 2.5%;">
          <mat-label>Número</mat-label>
          <input matInput type="text" appSomenteNumeros formControlName="numero" minlength="1" placeholder="Número...">
        </mat-form-field>

        <mat-form-field appearance="fill" class="campo-input" style="padding-right: 2.5%;">
          <mat-label>Complemento</mat-label>
          <input matInput formControlName="complemento" maxlength="100" placeholder="Complemento...">
        </mat-form-field>

        <mat-form-field appearance="fill" class="campo-input" style="padding-right: 2.5%;">
          <mat-label>Bairro</mat-label>
          <input matInput formControlName="bairro" maxlength="100" placeholder="Bairro...">
        </mat-form-field>

        <mat-form-field appearance="fill" class="campo-input" style="padding-right: 2.5%;">
          <mat-label>Cidade</mat-label>
          <input matInput formControlName="cidade" maxlength="100" placeholder="Cidade...">
        </mat-form-field>

        <mat-form-field appearance="fill" style="padding-right: 2%;width: 10%;">
          <mat-label>UF</mat-label>
              <mat-select formControlName="estado">
                @for (uf of listaUF; track uf) {
                  <mat-option [value]="uf">{{ uf }}</mat-option>
                }
              </mat-select>
        </mat-form-field>

        <mat-form-field appearance="fill" style="width: 18%;">
          <mat-label>CEP</mat-label>
          <input matInput type="text" appSomenteNumeros formControlName="cep" maxlength="8" placeholder="Somente números...">
        </mat-form-field>


        <!-- <mat-card-actions>
          <button mat-raised-button color="primary" type="submit" [disabled]="!cadastroEndereco.valid">
            Cadastrar
          </button>
        </mat-card-actions> -->
      </form>
    <!-- </mat-card-content>
  </mat-card> -->
</div>
