<app-home></app-home>
<div class="container-cadastro">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Cadastro de Usuário</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="cadastroForm" (ngSubmit)="cadastrar()">
        <mat-form-field appearance="fill" class="campo-input" style="padding-right: 2.5%;">
          <mat-label>Login</mat-label>
          <input matInput formControlName="login">
        </mat-form-field>

        <mat-form-field appearance="fill" class="campo-input" style="padding-left: 2.5%;padding-right: 2.5%;">
          <mat-label>Selecione um Perfil de Usuário</mat-label>
              <mat-select formControlName="perfil">
                @for (perfil of tiposUsuario; track perfil) {
                  <mat-option [value]="perfil">{{ perfil }}</mat-option>
                }
              </mat-select>
        </mat-form-field>

        <mat-form-field appearance="fill" class="campo-input" style="padding-left: 2.5%;">
          <mat-label>Senha</mat-label>
          <input matInput formControlName="senha" type="password">
        </mat-form-field>

        <mat-card-actions>
          <button mat-raised-button color="primary" type="submit" [disabled]="!cadastroForm.valid">
            Cadastrar
          </button>
        </mat-card-actions>
      </form>
    </mat-card-content>
  </mat-card>
</div>
